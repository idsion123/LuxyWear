<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="900" viewBox="0 0 1200 900">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2d2a24"/>
      <stop offset="100%" stop-color="#1a1815"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#c9a96e"/>
      <stop offset="100%" stop-color="#a8884a"/>
    </linearGradient>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#c9a96e" stroke-width="0.3" opacity="0.08"/>
    </pattern>
  </defs>
  <rect width="1200" height="900" fill="url(#bg)"/>
  <rect width="1200" height="900" fill="url(#grid)"/>

  <!-- Large decorative circle -->
  <circle cx="200" cy="200" r="300" fill="none" stroke="#c9a96e" stroke-width="0.5" opacity="0.12"/>
  <circle cx="200" cy="200" r="400" fill="none" stroke="#c9a96e" stroke-width="0.3" opacity="0.08"/>

  <circle cx="900" cy="700" r="250" fill="none" stroke="#c9a96e" stroke-width="0.5" opacity="0.1"/>
  <circle cx="900" cy="700" r="350" fill="none" stroke="#c9a96e" stroke-width="0.3" opacity="0.06"/>

  <!-- Vertical accent line -->
  <line x1="600" y1="0" x2="600" y2="900" stroke="#c9a96e" stroke-width="0.5" opacity="0.15"/>

  <!-- Top gold line -->
  <rect x="0" y="0" width="1200" height="2" fill="url(#gold)" opacity="0.3"/>

  <!-- Brand text -->
  <text x="100" y="480" font-family="serif" font-size="64" fill="#c9a96e" opacity="0.15" letter-spacing="8">LUXE</text>
  <text x="100" y="520" font-family="sans-serif" font-size="14" fill="#c9a96e" opacity="0.08" letter-spacing="4">LUXURY FASHION</text>

  <!-- Bottom right brand -->
  <text x="850" y="800" font-family="serif" font-size="120" fill="#c9a96e" opacity="0.04" letter-spacing="12">L</text>

  <!-- Subtle dots -->
  <g fill="#c9a96e" opacity="0.06">
    <circle cx="50" cy="50" r="2"/>
    <circle cx="1150" cy="50" r="2"/>
    <circle cx="50" cy="850" r="2"/>
    <circle cx="1150" cy="850" r="2"/>
    <circle cx="600" cy="50" r="1.5"/>
    <circle cx="600" cy="850" r="1.5"/>
  </g>
</svg>
